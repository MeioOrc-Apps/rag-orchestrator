name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKERHUB_IMAGE: sergiosjs/rag-orchestrator
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/rag-orchestrator

jobs:
  test-backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orchestrator
          POSTGRES_PASSWORD: orchestrator
          POSTGRES_DB: orchestrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      opensearch:
        image: opensearchproject/opensearch:3.0.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@localhost:5432/orchestrator
          TEST_DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@localhost:5432/orchestrator
          DOCLING_BASE_URL: http://localhost:5001
          OPENSEARCH_HOST: http://localhost:9200
          OPENSEARCH_INDEX_PREFIX: rag
          TEST_OPENSEARCH_HOST: http://localhost:9200
          DEFAULT_OWNER_USERNAME: sergio
          INPUT_DIR: /tmp/rag-inputs
          SCAN_INTERVAL_MINUTES: "15"
        run: pytest tests/ -x -q -m "not e2e"

  test-frontend:
    name: Frontend — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run

  build-and-push:
    name: Build and push Docker image
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
