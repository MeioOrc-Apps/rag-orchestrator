name: rag-orchestrator

networks:
  rag-network:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - rag-network
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    volumes:
      - /DATA/AppData/rag-orchestrator/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/meiorc-apps/rag-orchestrator:latest
    restart: unless-stopped
    networks:
      - rag-network
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8000"
      - "9700:9700"
    environment:
      DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@db:5432/orchestrator
      DOCLING_BASE_URL: http://host.docker.internal:5001
      OPENSEARCH_HOST: http://host.docker.internal:9200
      OPENSEARCH_INDEX_PREFIX: rag
      DEFAULT_OWNER_USERNAME: default
      INPUT_DIR: /data/inputs
      SCAN_INTERVAL_MINUTES: "15"
      PARSE_INTERVAL_MINUTES: "5"
      TRANSLATE_INTERVAL_MINUTES: "5"
      INDEX_INTERVAL_MINUTES: "5"
      MAX_TRANSLATION_RETRIES: "3"
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "100"
      ENRICHMENT_MODEL: local:qwen2.5:7b
      OLLAMA_HOST: http://host.docker.internal:11434
      MCP_PORT: "9700"
    volumes:
      - /DATA/AppData/rag-orchestrator/inputs:/data/inputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
